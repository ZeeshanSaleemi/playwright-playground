name: Playwright Tests

# ── SECTION 1: TRIGGER ──────────────────────────────────────────────────────
# Runs this workflow whenever code is pushed to the main branch.
on:
  pull_request:
    branches: [ main ]

# ── SECTION 2: JOB DEFINITION ───────────────────────────────────────────────
# A workflow is made of one or more "jobs". Each job runs in a fresh VM.
jobs:
  test:
    runs-on: ubuntu-latest   # Use the latest Ubuntu image provided by GitHub

    steps:
      # ── STEP 1: CHECKOUT ──────────────────────────────────────────────────
      # Downloads your repo's code into the VM so the rest of the steps can
      # work with it. Without this, the runner has no files to work with.
      - name: Checkout code
        uses: actions/checkout@v4

      # ── STEP 2: NODE.JS ───────────────────────────────────────────────────
      # Installs Node.js on the runner. The "cache: npm" line tells GitHub to
      # cache the npm dependency cache between runs so future installs are faster.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── STEP 3: INSTALL DEPENDENCIES ──────────────────────────────────────
      # `npm ci` is the CI-safe version of `npm install`. It installs exactly
      # what is in package-lock.json and errors out if the lockfile is missing
      # or out of sync — preventing unexpected version surprises in CI.
      - name: Install dependencies
        run: npm ci

      # ── STEP 4: INSTALL PLAYWRIGHT BROWSERS ───────────────────────────────
      # Downloads the Playwright browser binaries. `--with-deps` also installs
      # the OS-level system libraries (fonts, codecs, etc.) that the browsers
      # need on Linux. Only Chromium is installed here to match your config.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── STEP 5: RUN TESTS ─────────────────────────────────────────────────
      # Runs all Playwright tests. Because your playwright.config.ts has a
      # `webServer` block, Playwright will automatically start `node serve.js`
      # on port 3000 before the tests begin — so no separate server step is
      # needed. The CI=true env var is set automatically by GitHub Actions,
      # which enables retries and forces a fresh server start (per your config).
      #
      # NOTE: Your config has `headless: false`. On a Linux runner with no
      # display, this will cause tests to fail. Change it to `headless: true`
      # (or use `headless: !!process.env.CI ? false : true`) in
      # playwright.config.ts to fix this before pushing.
      - name: Run Playwright tests
        run: npx playwright test

      # ── STEP 6: UPLOAD HTML REPORT ────────────────────────────────────────
      # Uploads the HTML report folder as a downloadable artifact in GitHub.
      # `if: always()` ensures the report is uploaded even when tests fail —
      # which is exactly when you need it most. The report will be available
      # for 30 days under the "Actions" tab of your repository.
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
